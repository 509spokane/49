name: Supabase Keep-Alive

# Free-tier Supabase projects pause after ~7 days of inactivity. This pings the
# project every 5 days so it never goes idle long enough to be paused.
#
# `*/5` fires on days 1,6,11,16,21,26,31 — the only irregular gap is at month
# boundaries, and even there it stays <= 6 days, safely under the 7-day limit.

on:
  schedule:
    - cron: '0 12 */5 * *'   # 12:00 UTC every ~5 days
  workflow_dispatch:          # lets you run it on demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        env:
          # Project ref from the pause email (not a secret — it's in the URL).
          SUPABASE_URL: https://oximxoedgrhlveeycatb.supabase.co
          # Optional: add these in repo Settings → Secrets/Variables to upgrade
          # the ping to a real database query (guarantees DB activity).
          #   Secret   SUPABASE_ANON_KEY  — your project's anon/public API key
          #   Variable SUPABASE_TABLE     — any existing table name
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE }}
        run: |
          set -u

          # This project's gateway rejects keyless requests (401 before they
          # reach anything), so the anon key is required for the ping to count
          # as real activity. Fail loudly if it hasn't been configured yet.
          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "ERROR: SUPABASE_ANON_KEY is not set."
            echo "Add it under repo Settings -> Secrets and variables -> Actions"
            echo "  -> New repository secret -> name: SUPABASE_ANON_KEY"
            echo "Find the value in the Supabase dashboard: Project Settings -> API"
            echo "  -> Project API keys -> 'anon public'."
            exit 1
          fi

          # Prefer a real table SELECT (touches Postgres directly). Falls back to
          # the REST API root, which still reaches PostgREST with the key.
          if [ -n "${SUPABASE_TABLE:-}" ]; then
            endpoint="$SUPABASE_URL/rest/v1/$SUPABASE_TABLE?select=*&limit=1"
          else
            endpoint="$SUPABASE_URL/rest/v1/"
          fi

          code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$endpoint" || echo 000)
          echo "GET ${endpoint%%\?*} -> $code"

          case "$code" in
            000)
              echo "ERROR: no HTTP response — could not reach the project."
              exit 1 ;;
            401|403)
              echo "ERROR: reached the project but the anon key was rejected ($code)."
              echo "Double-check SUPABASE_ANON_KEY is the current 'anon public' key."
              exit 1 ;;
            *)
              echo "Keep-alive ping succeeded (HTTP $code)." ;;
          esac
