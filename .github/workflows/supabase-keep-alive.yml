name: Supabase Keep-Alive

# Free-tier Supabase projects pause after ~7 days of inactivity. This pings the
# project every 5 days so it never goes idle long enough to be paused.
#
# `*/5` fires on days 1,6,11,16,21,26,31 — the only irregular gap is at month
# boundaries, and even there it stays <= 6 days, safely under the 7-day limit.

on:
  schedule:
    - cron: '0 12 */5 * *'   # 12:00 UTC every ~5 days
  workflow_dispatch:          # lets you run it on demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        env:
          # Project ref from the pause email (not a secret — it's in the URL).
          SUPABASE_URL: https://oximxoedgrhlveeycatb.supabase.co
          # The project's public API key — works with either the legacy `anon`
          # JWT or a new `sb_publishable_...` key. Sent as the `apikey` header.
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Optional: set this repo Variable to ALSO run a real table SELECT each
          # time (guarantees the Postgres database itself sees a query).
          SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE }}
        shell: bash
        run: |
          # GitHub's default bash uses `set -e`, which would abort on curl's
          # non-zero exit before we can inspect it. Handle errors manually.
          set +e
          set -u

          # The public API key is required (the gateway rejects keyless requests).
          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "ERROR: SUPABASE_ANON_KEY is not set."
            echo "Add it under repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          host=$(printf '%s' "$SUPABASE_URL" | sed -E 's#^https?://([^/]+).*#\1#')
          echo "Resolving $host ..."
          getent hosts "$host" || echo "(no DNS record via getent)"

          # Primary keep-alive: an authenticated request to the Auth service.
          # Returns 200 with the public key and counts as project API activity.
          # A browser-ish User-Agent avoids Cloudflare resetting datacenter IPs.
          code=$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 \
            --retry 3 --retry-connrefused --retry-delay 5 \
            -A "Mozilla/5.0 (compatible; supabase-keepalive/1.0)" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health" 2>/tmp/curlerr.txt)
          rc=$?
          echo "GET /auth/v1/health -> http=$code curl_exit=$rc"
          [ "$rc" -ne 0 ] && { echo "curl stderr:"; cat /tmp/curlerr.txt; }

          # Optional: if a table is configured, also do a real SELECT so the
          # database itself registers a query (non-fatal — RLS may vary).
          if [ -n "${SUPABASE_TABLE:-}" ]; then
            tcode=$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 \
              -A "Mozilla/5.0 (compatible; supabase-keepalive/1.0)" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              "$SUPABASE_URL/rest/v1/$SUPABASE_TABLE?select=*&limit=1")
            echo "GET /rest/v1/$SUPABASE_TABLE -> http=$tcode"
          fi

          case "$code" in
            2*) echo "Keep-alive ping succeeded (HTTP $code)."; exit 0 ;;
          esac
          echo "ERROR: keep-alive ping failed (http=$code, curl_exit=$rc)."
          exit 1
