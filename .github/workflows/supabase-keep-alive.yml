name: Supabase Keep-Alive

# Free-tier Supabase projects pause after ~7 days of inactivity. This pings the
# project every 5 days so it never goes idle long enough to be paused.
#
# `*/5` fires on days 1,6,11,16,21,26,31 — the only irregular gap is at month
# boundaries, and even there it stays <= 6 days, safely under the 7-day limit.

on:
  schedule:
    - cron: '0 12 */5 * *'   # 12:00 UTC every ~5 days
  workflow_dispatch:          # lets you run it on demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        env:
          # Project ref from the pause email (not a secret — it's in the URL).
          SUPABASE_URL: https://oximxoedgrhlveeycatb.supabase.co
          # The project's public API key — works with either the legacy `anon`
          # JWT or a new `sb_publishable_...` key. Sent as the `apikey` header.
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Optional: set this repo Variable to ALSO run a real table SELECT each
          # time (guarantees the Postgres database itself sees a query).
          SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE }}
        run: |
          set -u

          # This project's gateway rejects keyless requests, so the public API
          # key is required for the ping to count as real activity. Fail loudly
          # if it hasn't been configured yet.
          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "ERROR: SUPABASE_ANON_KEY is not set."
            echo "Add it under repo Settings -> Secrets and variables -> Actions"
            echo "  -> New repository secret -> name: SUPABASE_ANON_KEY"
            echo "Value: Supabase dashboard -> Project Settings -> API -> the"
            echo "  'anon public' or 'publishable' key."
            exit 1
          fi

          # Primary keep-alive: an authenticated request to the Auth service.
          # Returns 200 with the public key and counts as project API activity.
          code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health" || echo 000)
          echo "GET /auth/v1/health -> $code"

          case "$code" in
            000)
              echo "ERROR: no HTTP response — could not reach the project."
              exit 1 ;;
            2*)
              echo "Keep-alive ping succeeded (HTTP $code)." ;;
            *)
              echo "ERROR: reached the project but got HTTP $code."
              echo "Check that SUPABASE_ANON_KEY is the current public/anon key."
              exit 1 ;;
          esac

          # Optional: if a table is configured, also do a real SELECT so the
          # database registers a query. Logged but non-fatal (RLS may return
          # 401/empty depending on your policies — the health ping above is
          # what keeps the project active).
          if [ -n "${SUPABASE_TABLE:-}" ]; then
            tcode=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 \
              -H "apikey: $SUPABASE_ANON_KEY" \
              "$SUPABASE_URL/rest/v1/$SUPABASE_TABLE?select=*&limit=1" || echo 000)
            echo "GET /rest/v1/$SUPABASE_TABLE -> $tcode"
          fi
