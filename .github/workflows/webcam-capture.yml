name: Capture Lodge Webcam

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture webcam frame
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H-%M)
          mkdir -p "frames/$DATE/lodge"
          CORRUPTED=false

          echo "Downloading lodge webcam at $DATE $TIME..."
          curl -s --connect-timeout 10 --max-time 30 \
            -A "Mozilla/5.0" \
            -o "frames/$DATE/lodge/$TIME.jpg" \
            https://www.ski49n.com/webcams/lodge.jpg

          if [ ! -s "frames/$DATE/lodge/$TIME.jpg" ]; then
            echo "ERROR: Image download failed or empty"
            exit 1
          fi

          # Validate it's a real JPEG (first 2 bytes must be FF D8)
          HEADER=$(xxd -l 2 -p "frames/$DATE/lodge/$TIME.jpg")
          if [ "$HEADER" != "ffd8" ]; then
            echo "WARNING: Not a valid JPEG (header: $HEADER) — quarantining"
            CORRUPTED=true
          fi

          # Deep-validate: detect partial-download corruption (vertical stripes).
          # When the webcam stream cuts out mid-frame, the JPEG decoder fills the
          # remaining rows by repeating the last valid 8-row MCU block — producing
          # long runs of identical consecutive rows. Real images never have this.
          if [ "$CORRUPTED" = "false" ]; then
            python3 - "frames/$DATE/lodge/$TIME.jpg" << 'PYEOF'
import subprocess, sys

def is_striped(path, sample_cols=80, min_run=8):
    r = subprocess.run(['djpeg', '-pnm', path], capture_output=True)
    if r.returncode != 0: return False
    data = r.stdout
    if not data.startswith(b'P6'): return False
    i = 0; n = 0
    while n < 3:
        if data[i] == ord('\n'): n += 1
        i += 1
    parts = data[:i].decode().split()
    w, h = int(parts[1]), int(parts[2])
    pixel_data = data[i:]
    row_bytes = w * 3
    step = max(1, w // sample_cols)
    cols = list(range(0, w, step))[:sample_cols]
    run, prev = 1, None
    for r in range(int(h * 0.70), h):
        offset = r * row_bytes
        if offset + row_bytes > len(pixel_data): break
        row = bytes(pixel_data[offset + c*3] for c in cols)
        run = run + 1 if row == prev else 1
        if run >= min_run: return True
        prev = row
    return False

if is_striped(sys.argv[1]):
    print("WARNING: repeated-row pattern detected in bottom 30% — quarantining")
    sys.exit(1)
PYEOF
            if [ $? -ne 0 ]; then
              CORRUPTED=true
            fi
          fi

          if [ "$CORRUPTED" = "true" ]; then
            # File stays in place — log it to quarantine index for admin review
            mkdir -p frames/quarantine
            QINDEX="frames/quarantine/index.json"
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            if [ -f "$QINDEX" ]; then
              jq --arg date "$DATE" --arg time "$TIME" --arg ts "$TIMESTAMP" \
                '. += [{"date":$date,"time":$time,"reason":"JPEG integrity check failed","quarantined_at":$ts}]' \
                "$QINDEX" > "$QINDEX.tmp" && mv "$QINDEX.tmp" "$QINDEX"
            else
              printf '[{"date":"%s","time":"%s","reason":"JPEG integrity check failed","quarantined_at":"%s"}]\n' \
                "$DATE" "$TIME" "$TIMESTAMP" > "$QINDEX"
            fi
            echo "Quarantined: frames/$DATE/lodge/$TIME.jpg added to $QINDEX"
          else
            echo "Downloaded: $(wc -c < frames/$DATE/lodge/$TIME.jpg) bytes (valid JPEG)"

            MANIFEST="frames/$DATE/manifest.json"
            if [ -f "$MANIFEST" ]; then
              jq --arg t "$TIME" '.lodge += [$t] | .lodge |= unique | .lodge |= sort' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
              echo "Updated manifest"
            else
              echo "{\"date\":\"$DATE\",\"lodge\":[\"$TIME\"]}" > "$MANIFEST"
              echo "Created manifest"
            fi

            # Keep frames/index.json up to date with all available dates
            ls frames/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | sort | jq -Rs '[split("\n")[] | select(length>0)]' > frames/index.json
            echo "Updated frames/index.json"
          fi

      - name: Commit and push
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H-%M)
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add "frames/$DATE/" frames/index.json
          [ -d frames/quarantine ] && git add frames/quarantine/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Webcam capture $DATE $TIME"
            git push
          fi
