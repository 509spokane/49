name: Capture Lodge Webcam

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture webcam and update manifest
        run: |
          # Get current date and time
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H-%M)
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "TIME=$TIME" >> $GITHUB_ENV

          # Create directory structure
          mkdir -p "frames/$DATE/lodge"

          # Download the webcam image
          echo "Downloading lodge webcam image..."
          curl -s --connect-timeout 10 --max-time 30 -o "frames/$DATE/lodge/$TIME.jpg" \
            -A "Mozilla/5.0" \
            https://www.ski49n.com/webcams/lodge.jpg

          # Check if image was downloaded successfully
          if [ ! -f "frames/$DATE/lodge/$TIME.jpg" ] || [ ! -s "frames/$DATE/lodge/$TIME.jpg" ]; then
            echo "ERROR: Failed to download webcam image or file is empty"
            exit 1
          fi
          echo "Image downloaded: $(ls -lh "frames/$DATE/lodge/$TIME.jpg")"

          # Update manifest
          python3 << 'PYTHON_EOF'
          import json
          import os
          import sys

          date_str = os.environ.get('DATE')
          time_str = os.environ.get('TIME')

          if not date_str or not time_str:
              print("ERROR: DATE or TIME not set")
              sys.exit(1)

          manifest_file = f"frames/{date_str}/manifest.json"
          os.makedirs(os.path.dirname(manifest_file), exist_ok=True)

          # Load or create manifest
          if os.path.exists(manifest_file):
              with open(manifest_file, 'r') as f:
                  manifest = json.load(f)
          else:
              manifest = {"date": date_str, "lodge": []}

          # Add timestamp if not present
          if time_str not in manifest.get('lodge', []):
              manifest['lodge'].append(time_str)
              manifest['lodge'].sort()
              print(f"Added frame: {time_str}")
          else:
              print(f"Frame already exists: {time_str}")

          # Write manifest
          with open(manifest_file, 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f"Manifest updated: {manifest_file}")
          PYTHON_EOF

      - name: Commit and push
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add frames/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Capture lodge webcam at ${{ env.TIME }}"
            git push origin main
          fi
