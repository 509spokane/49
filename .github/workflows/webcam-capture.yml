name: Capture Lodge Webcam

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Capture webcam and update manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Get current date and time
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H-%M)

          # Create directory structure
          mkdir -p "frames/$DATE/lodge"

          # Download the webcam image
          curl -s -f -o "frames/$DATE/lodge/$TIME.jpg" \
            -A "Mozilla/5.0" \
            https://www.ski49n.com/webcams/lodge.jpg

          # Check if image was downloaded successfully
          if [ ! -f "frames/$DATE/lodge/$TIME.jpg" ]; then
            echo "Failed to download webcam image"
            exit 1
          fi

          # Generate or update manifest using Python with environment variables
          MANIFEST_FILE="frames/$DATE/manifest.json"
          python3 << EOF
          import json
          import os

          date_str = "$DATE"
          time_str = "$TIME"
          manifest_file = f"frames/{date_str}/manifest.json"

          # Load or create manifest
          if os.path.exists(manifest_file):
              with open(manifest_file, 'r') as f:
                  manifest = json.load(f)
          else:
              manifest = {"date": date_str, "lodge": []}

          # Add timestamp if not present
          if time_str not in manifest.get('lodge', []):
              manifest['lodge'].append(time_str)
              manifest['lodge'].sort()

          # Write manifest
          with open(manifest_file, 'w') as f:
              json.dump(manifest, f, indent=2)
          EOF

          # Configure git
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          # Commit and push
          git add "frames/$DATE/"

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Capture lodge webcam at $TIME"
            git push
          fi
