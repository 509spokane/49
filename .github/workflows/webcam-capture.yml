name: Capture Lodge Webcam

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Capture webcam and upload via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Get current date and time
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H-%M)

          echo "Downloading lodge webcam..."
          curl -s --connect-timeout 10 --max-time 30 -o /tmp/lodge.jpg \
            -A "Mozilla/5.0" \
            https://www.ski49n.com/webcams/lodge.jpg

          if [ ! -s /tmp/lodge.jpg ]; then
            echo "ERROR: Failed to download image"
            exit 1
          fi

          # Convert image to base64
          IMAGE_B64=$(base64 -w 0 /tmp/lodge.jpg)
          IMAGE_SIZE=$(wc -c < /tmp/lodge.jpg)
          echo "Downloaded image: $IMAGE_SIZE bytes"

          # Upload image via GitHub API
          FILE_PATH="frames/$DATE/lodge/$TIME.jpg"
          curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/contents/$FILE_PATH \
            -d @- << EOF
          {
            "message": "Capture lodge webcam at $TIME",
            "content": "$IMAGE_B64",
            "branch": "main"
          }
          EOF

          echo "Image uploaded to: $FILE_PATH"

          # Fetch and update manifest
          python3 << 'PYTHON_EOF'
          import json
          import subprocess
          import os
          from datetime import datetime

          date_str = datetime.utcnow().strftime("%Y-%m-%d")
          time_str = datetime.utcnow().strftime("%H-%M")
          manifest_path = f"frames/{date_str}/manifest.json"

          # Try to get existing manifest
          result = subprocess.run([
              "curl", "-s",
              "-H", f"Authorization: token {os.environ['GITHUB_TOKEN']}",
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/contents/{manifest_path}"
          ], capture_output=True, text=True)

          try:
              data = json.loads(result.stdout)
              if "content" in data:
                  import base64
                  manifest = json.loads(base64.b64decode(data["content"]).decode())
                  sha = data["sha"]
              else:
                  manifest = {"date": date_str, "lodge": []}
                  sha = None
          except:
              manifest = {"date": date_str, "lodge": []}
              sha = None

          # Add new timestamp
          if time_str not in manifest.get("lodge", []):
              manifest["lodge"].append(time_str)
              manifest["lodge"].sort()

          # Upload manifest
          manifest_json = json.dumps(manifest, indent=2)
          manifest_b64 = __import__("base64").b64encode(manifest_json.encode()).decode()

          curl_cmd = ["curl", "-s", "-X", "PUT",
              "-H", f"Authorization: token {os.environ['GITHUB_TOKEN']}",
              "-H", "Accept: application/vnd.github.v3+json",
              "-H", "Content-Type: application/json"]

          payload = {
              "message": f"Update manifest for {date_str}",
              "content": manifest_b64,
              "branch": "main"
          }
          if sha:
              payload["sha"] = sha

          curl_cmd.append(f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/contents/{manifest_path}")

          result = subprocess.run(curl_cmd + ["-d", json.dumps(payload)],
              capture_output=True, text=True)

          print(f"Manifest updated: {manifest_path}")
          PYTHON_EOF
