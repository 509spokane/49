<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>49°N Frame Admin</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; }
header { background: #1e293b; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
header h1 { margin: 0; font-size: 16px; font-weight: 700; }
.pat-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pat-bar label { font-size: 12px; color: #64748b; white-space: nowrap; }
.pat-bar input { flex: 1; min-width: 220px; padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-family: monospace; }
.pat-bar button { padding: 5px 14px; background: #334155; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.pat-bar button:hover { background: #1e293b; }
#patStatus { font-size: 12px; color: #64748b; }

.layout { display: flex; height: calc(100vh - 90px); }
.sidebar { width: 160px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 10px 0; }
.sidebar-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; padding: 0 12px 6px; }
.date-btn { display: block; width: 100%; text-align: left; padding: 7px 12px; background: none; border: none; font-size: 13px; color: #475569; cursor: pointer; border-left: 3px solid transparent; }
.date-btn:hover { background: #f8fafc; }
.date-btn.active { background: #f0f9ff; color: #0369a1; border-left-color: #0369a1; font-weight: 600; }

.main { flex: 1; overflow-y: auto; padding: 16px; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar h2 { margin: 0; font-size: 15px; font-weight: 600; flex: 1; }
#statusMsg { font-size: 12px; color: #64748b; }
#deleteMarkedBtn { padding: 6px 16px; background: #ef4444; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; display: none; }
#deleteMarkedBtn:hover { background: #dc2626; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.thumb { background: #fff; border: 2px solid #e2e8f0; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
.thumb:hover { border-color: #94a3b8; }
.thumb.marked { border-color: #ef4444; background: #fff5f5; }
.thumb img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; background: #e2e8f0; }
.thumb-footer { padding: 5px 8px; display: flex; align-items: center; justify-content: space-between; }
.thumb-time { font-size: 11px; color: #475569; }
.thumb-mark { font-size: 10px; font-weight: 700; color: #ef4444; display: none; }
.thumb.marked .thumb-mark { display: block; }
.thumb-utc { font-size: 10px; color: #94a3b8; }

.empty { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e2e8f0; border-top-color: #64748b; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>49°N Frame Admin</h1>
  <span style="font-size:11px;opacity:0.6;">Private — do not share this URL</span>
</header>

<div class="pat-bar">
  <label>GitHub Token (repo write):</label>
  <input type="password" id="patInput" placeholder="ghp_…" autocomplete="off" />
  <button onclick="savePat()">Save Token</button>
  <span id="patStatus"></span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Dates</div>
    <div id="datesList"><div class="empty" style="padding:20px 12px;font-size:12px;">Loading…</div></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <h2 id="pageTitle">Select a date</h2>
      <span id="statusMsg"></span>
      <button id="deleteMarkedBtn" onclick="deleteMarked()">🗑 Delete Marked (<span id="markedCount">0</span>)</button>
    </div>
    <div id="imageGrid" class="grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER = '509spokane';
const REPO  = '49';

// — PAT —
function savePat() {
  const v = document.getElementById('patInput').value.trim();
  if (!v) return;
  localStorage.setItem('adminPAT', v);
  document.getElementById('patStatus').textContent = '✓ Saved';
  setTimeout(() => document.getElementById('patStatus').textContent = '', 2000);
}
function getPat() { return localStorage.getItem('adminPAT') || ''; }

const savedPat = getPat();
if (savedPat) {
  document.getElementById('patInput').value = savedPat;
  document.getElementById('patStatus').textContent = '✓ Token loaded';
}

// — GitHub API —
async function ghGet(path) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    headers: { Authorization: `Bearer ${getPat()}`, Accept: 'application/vnd.github+json' }
  });
  if (!r.ok) throw new Error(`GitHub API error ${r.status} for ${path}`);
  return r.json();
}

async function ghDelete(path, sha, message) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${getPat()}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || `Delete failed ${r.status}`); }
  return r.json();
}

async function ghPut(path, content, sha, message) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${getPat()}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: btoa(content), sha })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || `Update failed ${r.status}`); }
  return r.json();
}

// — Toast —
let _toastTimer;
function toast(msg, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// — Load dates —
async function loadDates() {
  try {
    const res = await fetch('frames/index.json?t=' + Date.now());
    const dates = await res.json();
    const list = document.getElementById('datesList');
    list.innerHTML = '';
    [...dates].reverse().forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'date-btn';
      btn.textContent = d;
      btn.onclick = () => loadDate(d);
      list.appendChild(btn);
    });
  } catch(e) {
    document.getElementById('datesList').innerHTML = `<div class="empty" style="padding:12px;font-size:12px;color:#ef4444;">Error: ${e.message}</div>`;
  }
}

// — Load images for a date —
let _currentDate = null;
let _markedTimes = new Set();

async function loadDate(date) {
  _currentDate = date;
  _markedTimes.clear();
  updateDeleteBtn();

  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === date);
  });

  document.getElementById('pageTitle').textContent = date;
  document.getElementById('statusMsg').innerHTML = '<span class="spinner"></span>Loading…';
  document.getElementById('imageGrid').innerHTML = '';

  try {
    const res = await fetch(`frames/${date}/manifest.json?t=` + Date.now());
    if (!res.ok) throw new Error('Manifest not found');
    const manifest = await res.json();
    const times = manifest.lodge || [];

    document.getElementById('statusMsg').textContent = `${times.length} image${times.length !== 1 ? 's' : ''} — click to mark for deletion`;

    if (times.length === 0) {
      document.getElementById('imageGrid').innerHTML = '<div class="empty">No images for this date.</div>';
      return;
    }

    const grid = document.getElementById('imageGrid');
    times.forEach(time => {
      const [hh, mm] = time.split('-');
      const utc = new Date(`${date}T${hh}:${mm}:00Z`);
      const ptLabel = utc.toLocaleString('en-US', { timeZone: 'America/Los_Angeles', weekday: 'short', hour: 'numeric', minute: '2-digit', hour12: true });

      const div = document.createElement('div');
      div.className = 'thumb';
      div.dataset.time = time;
      div.innerHTML = `
        <img src="frames/${date}/lodge/${time}.jpg" loading="lazy" alt="${time}" />
        <div class="thumb-footer">
          <span class="thumb-time">${ptLabel}</span>
          <span class="thumb-mark">✕ DELETE</span>
        </div>
        <div style="padding:0 8px 6px;font-size:10px;color:#94a3b8;">${time} UTC</div>
      `;
      div.addEventListener('click', () => toggleMark(div, time));
      grid.appendChild(div);
    });
  } catch(e) {
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('imageGrid').innerHTML = `<div class="empty" style="color:#ef4444;">Error: ${e.message}</div>`;
  }
}

function toggleMark(div, time) {
  const marked = div.classList.toggle('marked');
  if (marked) _markedTimes.add(time);
  else _markedTimes.delete(time);
  updateDeleteBtn();
}

function updateDeleteBtn() {
  const btn = document.getElementById('deleteMarkedBtn');
  const count = _markedTimes.size;
  btn.style.display = count > 0 ? '' : 'none';
  document.getElementById('markedCount').textContent = count;
}

// — Delete marked images —
async function deleteMarked() {
  if (!_currentDate || _markedTimes.size === 0) return;
  if (!getPat()) { alert('Please enter and save your GitHub Personal Access Token first.'); return; }

  const list = [..._markedTimes];
  const plural = list.length === 1 ? 'image' : 'images';
  if (!confirm(`Permanently delete ${list.length} ${plural} from ${_currentDate}?\n\n${list.join(', ')}`)) return;

  document.getElementById('statusMsg').innerHTML = '<span class="spinner"></span>Deleting…';
  document.getElementById('deleteMarkedBtn').disabled = true;

  let deleted = 0, errors = [];

  // Fetch directory listing once to get all SHAs (avoids 1MB API limit on file content fetch)
  let dirListing = null;
  try {
    dirListing = await ghGet(`frames/${_currentDate}/lodge`);
  } catch(e) {
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('deleteMarkedBtn').disabled = false;
    alert(`Could not read directory listing: ${e.message}`);
    return;
  }

  for (const time of list) {
    try {
      const filePath = `frames/${_currentDate}/lodge/${time}.jpg`;
      const fileEntry = Array.isArray(dirListing) ? dirListing.find(f => f.name === `${time}.jpg`) : null;
      if (!fileEntry) throw new Error(`File not found in directory listing`);
      await ghDelete(filePath, fileEntry.sha, `Remove corrupted frame ${_currentDate} ${time}`);
      deleted++;
    } catch(e) {
      errors.push(`${time}: ${e.message}`);
    }
  }

  // Update manifest to remove deleted times
  if (deleted > 0) {
    try {
      const manifestPath = `frames/${_currentDate}/manifest.json`;
      const mData = await ghGet(manifestPath);
      const manifest = JSON.parse(atob(mData.content.replace(/\n/g, '')));
      manifest.lodge = (manifest.lodge || []).filter(t => !list.includes(t));
      const newJson = JSON.stringify(manifest, null, 2);
      await ghPut(manifestPath, newJson, mData.sha, `Update manifest: remove ${list.length} deleted frame(s) from ${_currentDate}`);
    } catch(e) {
      errors.push(`Manifest update: ${e.message}`);
    }
  }

  document.getElementById('deleteMarkedBtn').disabled = false;

  if (errors.length) {
    alert('Some errors occurred:\n' + errors.join('\n'));
  } else {
    toast(`✓ Deleted ${deleted} ${plural} and updated manifest`);
  }

  // Remove deleted thumbnails from grid
  list.forEach(time => {
    const el = document.querySelector(`.thumb[data-time="${time}"]`);
    if (el) el.remove();
  });
  _markedTimes.clear();
  updateDeleteBtn();

  const remaining = document.querySelectorAll('.thumb').length;
  document.getElementById('statusMsg').textContent = `${remaining} image${remaining !== 1 ? 's' : ''} — click to mark for deletion`;
}

// — Init —
loadDates();
</script>
</body>
</html>
