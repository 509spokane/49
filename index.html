<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ski 49°N Live Views</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #111;
    }
    .container {
      max-width: 100%;
      padding: 0;
    }
    .top-bar {
      width: 100%;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
    }
    .top-table {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }
    .top-table .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      text-align: center;
    }
    .top-table .cell a {
      text-decoration: none;
      font-weight: 600;
      color: #000;
      font-size: 13px; /* slightly smaller text */
    }
    .top-table .logo img {
      max-width: 100%;
      height: 40px;
      object-fit: contain;
    }
    .section {
      margin: 0;
      padding: 0;
      position: relative;
    }
    .section a img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0;
    }
    /* Stats overlay div */
    .stats-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      background: rgba(255,255,255,0.8);
      color: #000;
      padding: 10px;
      font-weight: 600;
      font-size: 14px;
      border-radius: 5px;
      display: none; /* hidden initially */
      z-index: 500;
    }
    /* Toggle button style */
    #stats-toggle {
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      padding: 5px 8px;
      border: 1px solid #000;
      border-radius: 3px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="top-table">
        <div class="cell logo">
          <a href="https://ski49n.com">
            <img src="https://www.ski49n.com/images/logo.png" alt="ski" />
          </a>
        </div>
        <div class="cell">
          <a href="https://forecast.weather.gov/MapClick.php?lon=-117.56499767303468&lat=48.285800530169524">Weather</a>
        </div>
        <div class="cell">
          <a href="https://www.ski49n.com/mountain-info/expanded-conditions">Conditions</a>
        </div>
        <div class="cell">
          <span id="stats-toggle">Stats</span>
        </div>
      </div>
    </div>

    <div class="section">
      <a href="https://www.ski49n.com/webcams/lodge.jpg">
        <img src="https://www.ski49n.com/webcams/lodge.jpg" alt="Lodge Webcam" />
      </a>
      <div class="stats-overlay" id="snow-stats">Loading snow info...</div>
    </div>

    <div class="section">
      <a href="https://www.ski49n.com/webcams/summit.jpg">
        <img src="https://www.ski49n.com/webcams/summit.jpg" alt="Summit Webcam" />
      </a>
    </div>

    <div class="section">
      <a href="https://www.ski49n.com/webcams/sunrise.jpg">
        <img src="https://www.ski49n.com/webcams/sunrise.jpg" alt="Chair 5 Webcam" />
      </a>
    </div>
  </div>

  <script>
    const statsToggle = document.getElementById('stats-toggle');
    const statsOverlay = document.getElementById('snow-stats');

    // Toggle visibility
    statsToggle.addEventListener('click', () => {
      if (statsOverlay.style.display === 'none') {
        statsOverlay.style.display = 'block';
      } else {
        statsOverlay.style.display = 'none';
      }
    });

    // Fetch snow data from Cloudflare Worker
    async function fetchSnowData() {
      try {
        const res = await fetch('https://your-worker-url.workers.dev'); // replace with your Worker URL
        const data = await res.json();
        statsOverlay.textContent = 
  `New Snow (Summit): 12h: ${data["12h"]} in, 24h: ${data["24h"]} in, 48h: ${data["48h"]} in, 72h: ${data["72h"]} in, Snow Depth: ${data["summitDepth"]} in`;
      } catch (err) {
        console.error(err);
        statsOverlay.textContent = 'Snow data unavailable';
      }
    }

    fetchSnowData();
    // Optionally, refresh every 4 hours (14400000 ms)
    setInterval(fetchSnowData, 14400000);
  </script>
</body>
</html>
