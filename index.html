<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ski 49°N Live Views</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background-color: #ffffff;
  color: #111;
}
.container { max-width: 100%; padding: 0; }
.top-bar {
  width: 100%;
  background: rgba(255, 255, 255, 0.95);
  padding: 5px 0;
}
.top-table {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
}
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  text-align: center;
}
.cell:not(.logo) a {
  display: inline-block;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 6px 12px;
  text-decoration: none;
  font-weight: 600;
  color: #334155;
  font-size: 13px;
}
.logo img {
  max-width: 100%;
  height: 40px;
  object-fit: contain;
}
#statsOverlay {
  background: rgba(255,255,255,0.8);
  color: #000;
  padding: 4px 8px 6px;
  font-size: 12px;
  box-sizing: border-box;
}
#statsOverlay .stats-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
}
.stats-table {
  margin-top: 6px;
  border-radius: 6px;
  overflow: hidden;
  background: #f1f5f9;
}
.stats-row {
  display: flex;
}
.stats-row > div {
  flex: 1;
  text-align: center;
  padding: 5px 4px;
}
.stats-row.stat-labels > div {
  font-weight: 600;
  font-size: 11px;
  color: #475569;
  border-bottom: 1px solid #e2e8f0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.stats-row.stat-values > div {
  font-weight: 600;
  font-size: 13px;
  color: #1e293b;
}
.section {
  position: relative;
}
.section a img {
  width: 100%;
  display: block;
}
.forecast-caption {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin: 16px 10px 8px;
}
#noaaUpdated {
  text-transform: none;
  font-weight: normal;
  letter-spacing: normal;
}
.forecast-grid {
  display: flex;
  gap: 6px;
  margin: 0 10px 10px;
}
.day-card {
  flex: 1;
  border-radius: 6px;
  overflow: hidden;
  font-size: 13px;
  text-align: center;
}
.day-card .day-header {
  background: #94a3b8;
  color: #fff;
  font-weight: 700;
  padding: 7px 4px;
  font-size: 13px;
}
.day-card .row-temp-day {
  background: #fefce8;
  color: #92400e;
  font-weight: 600;
  padding: 7px 4px;
  font-size: 13px;
}
.day-card .row-snow-day {
  background: #fffef5;
  padding: 6px 4px;
  border-top: 1px solid rgba(0,0,0,0.05);
  min-height: 1.2em;
}
.day-card .night-label {
  background: #e2e8f0;
  color: #334155;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 4px 2px;
  text-transform: uppercase;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.day-card .row-temp-night {
  background: #f1f5f9;
  color: #334155;
  font-weight: 600;
  padding: 7px 4px;
  font-size: 13px;
}
.day-card .row-snow-night {
  background: #f8fafc;
  padding: 6px 4px;
  border-top: 1px solid rgba(0,0,0,0.05);
  min-height: 1.2em;
}
.day-card .row-total {
  background: #dde4ed;
  color: #1e293b;
  font-weight: 700;
  font-size: 12px;
  padding: 7px 4px;
  border-top: 1px solid rgba(0,0,0,0.08);
  min-height: 1.2em;
}
.weather-temp.hidden { display: none; }
.label-card { flex: none; width: 44px; }
.settings-section {
  margin: 16px 10px 24px;
  padding: 12px 14px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
}
.settings-section .settings-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #94a3b8;
  margin-bottom: 10px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid #e2e8f0;
}
.settings-row:last-child { border-bottom: none; }
.settings-row label {
  font-size: 13px;
  font-weight: 500;
  color: #334155;
  cursor: pointer;
}
.toggle-switch {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #cbd5e1;
  border-radius: 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider:before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch input:checked + .toggle-slider { background: #64748b; }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
@media (max-width: 480px) and (orientation: portrait) {
  .day-card { font-size: 10px; }
  .day-card .day-header { font-size: 10px; padding: 5px 2px; }
  .day-card .row-temp-day, .day-card .row-temp-night { font-size: 10px; padding: 5px 2px; }
  .day-card .row-snow-day, .day-card .row-snow-night { font-size: 10px; padding: 4px 2px; }
  .day-card .night-label { font-size: 8px; padding: 3px 1px; }
  .day-card .row-total { font-size: 10px; padding: 5px 2px; }
  .forecast-grid { gap: 3px; }
  .label-card { width: 36px; }
}
</style>
</head>
<body>
<div class="container">

<!-- Top bar -->
<div class="top-bar">
  <div class="top-table">
    <div class="cell logo">
      <a href="https://ski49n.com">
        <img src="https://www.ski49n.com/images/logo.png" alt="ski" />
      </a>
    </div>
    <div class="cell">
      <a href="https://forecast.weather.gov/MapClick.php?lon=-117.56499767303468&lat=48.285800530169524">Weather</a>
    </div>
    <div class="cell">
      <a href="https://www.ski49n.com/mountain-info/expanded-conditions">Conditions</a>
    </div>
    <div class="cell">
      <a href="https://www.ski49n.com/mountain-info/trail-status">Grooming</a>
    </div>
  </div>
  <div id="statsOverlay">Loading snow data...</div>
</div>

<!-- Forecast cards -->
<div class="forecast-caption"><span>NOAA Snow Forecast</span><span id="noaaUpdated"></span></div>
<div class="forecast-grid" id="forecastGrid"></div>

<!-- Webcam sections -->
<div class="section">
  <a href="https://www.ski49n.com/webcams/lodge.jpg">
    <img src="https://www.ski49n.com/webcams/lodge.jpg" alt="Lodge Webcam" />
  </a>
</div>
<div class="section">
  <a href="https://www.ski49n.com/webcams/summit.jpg">
    <img src="https://www.ski49n.com/webcams/summit.jpg" alt="Summit Webcam" />
  </a>
</div>
<div class="section">
  <a href="https://www.ski49n.com/webcams/sunrise.jpg">
    <img src="https://www.ski49n.com/webcams/sunrise.jpg" alt="Chair 5 Webcam" />
  </a>
</div>

<!-- Settings -->
<div class="settings-section">
  <div class="settings-title">Settings</div>
  <div class="settings-row">
    <label for="toggleConditions">Show Snow Conditions</label>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleConditions" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="settings-row">
    <label for="toggleForecast">Show Snow Forecast</label>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleForecast" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="settings-row">
    <label for="toggleWeather">Show Weather in Forecast</label>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleWeather" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

</div>

<script>
const statsOverlay = document.getElementById('statsOverlay');

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function dateLabel(date, hourStr) {
  const today = new Date(), yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);
  if (sameDay(date, today)) return `Today ${hourStr}`;
  if (sameDay(date, yesterday)) return `Yesterday ${hourStr}`;
  const mo = (date.getMonth()+1).toString().padStart(2,'0');
  const dy = date.getDate().toString().padStart(2,'0');
  return `${mo}/${dy} ${hourStr}`;
}

// Load ski conditions from Cloudflare Worker (scrapes ski49n.com)
async function loadStats() {
  try {
    const res = await fetch('https://49.todd-0ce.workers.dev?t=' + Date.now());
    const data = await res.json();
    const t = data.totals;
    if (!t) { statsOverlay.textContent = "Data Error"; return; }

    function formatUpdated(str) {
      const match = str.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)(am|pm)/i);
      if (!match) return str;
      const [, mo, dy, yr, h, m, ampm] = match;
      const date = new Date(2000 + parseInt(yr), parseInt(mo)-1, parseInt(dy));
      let hour = parseInt(h), period = ampm.toLowerCase();
      if (parseInt(m) >= 30) { hour++; if (hour===12&&period==='am') period='pm'; if (hour===13) hour=1; }
      return dateLabel(date, `${hour}${period}`);
    }

    const stats = [
      { label: '12h',   val: t["12h"]       },
      { label: '24h',   val: t["24h"]       },
      { label: '48h',   val: t["48h"]       },
      { label: '72h',   val: t["72h"]       },
      { label: 'Depth', val: t.summitDepth  },
    ].filter(s => s.val !== undefined && s.val !== null && s.val !== '');

    statsOverlay.innerHTML = `
      <div class="stats-header">
        <span style="font-weight:700;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#888;">Latest Snowfall</span>
        <span style="color:#888;">Updated: ${formatUpdated(t.updated || '')}</span>
      </div>
      <div class="stats-table">
        <div class="stats-row stat-labels">${stats.map(s => `<div>${s.label}</div>`).join('')}</div>
        <div class="stats-row stat-values">${stats.map(s => `<div>${s.val}"</div>`).join('')}</div>
      </div>
    `;
  } catch(e) {
    statsOverlay.textContent = "Data Error";
  }
}

// Load 5-day snowfall forecast from NOAA public API
async function loadForecast() {
  try {
    const res = await fetch('https://api.weather.gov/gridpoints/OTX/141,120/forecast');
    const data = await res.json();
    const periods = data.properties.periods.slice(0, 10);

    function extractSnow(detail) {
      const match = detail.match(/new snow accumulation of ([^.]+)/i);
      if (!match) return '';
      let s = match[1].trim().toLowerCase().replace(/\s*possible\s*$/, '').trim();
      if (/less than half an inch/.test(s)) return '< .5"';
      const ltMatch = s.match(/less than (\d+) inch/);
      if (ltMatch) return `< ${ltMatch[1]}"`;
      const rangeMatch = s.match(/(\d+) to (\d+) inch/);
      if (rangeMatch) return `${rangeMatch[1]}-${rangeMatch[2]}"`;
      const aroundMatch = s.match(/around (\d+) inch/);
      if (aroundMatch) return `~${aroundMatch[1]}"`;
      const upToMatch = s.match(/up to (\d+) inch/);
      if (upToMatch) return `up to ${upToMatch[1]}"`;
      const singleMatch = s.match(/^(\d+) inch/);
      if (singleMatch) return `${singleMatch[1]}"`;
      return s;
    }

    function shortDayName(name) {
      const clean = name.replace(/ Night$/, '').replace('Tonight', 'Today');
      const map = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed', Thursday:'Thu', Friday:'Fri', Saturday:'Sat', Sunday:'Sun' };
      return map[clean] || clean;
    }

    function parseRange(formatted) {
      if (!formatted) return { min: 0, max: 0 };
      if (formatted === '< .5"') return { min: 0, max: 0.5 };
      const lt = formatted.match(/^< (\d+(?:\.\d+)?)"$/);
      if (lt) return { min: 0, max: parseFloat(lt[1]) };
      const range = formatted.match(/^(\d+(?:\.\d+)?)-(\d+(?:\.\d+)?)"$/);
      if (range) return { min: parseFloat(range[1]), max: parseFloat(range[2]) };
      const around = formatted.match(/^~(\d+(?:\.\d+)?)"$/);
      if (around) return { min: parseFloat(around[1]), max: parseFloat(around[1]) };
      const upTo = formatted.match(/^up to (\d+(?:\.\d+)?)"$/);
      if (upTo) return { min: 0, max: parseFloat(upTo[1]) };
      const single = formatted.match(/^(\d+(?:\.\d+)?)"$/);
      if (single) return { min: parseFloat(single[1]), max: parseFloat(single[1]) };
      return { min: 0, max: 0 };
    }

    function formatCumulative(min, max) {
      const fMin = Math.floor(min);
      const fMax = Math.floor(max);
      if (fMin === 0 && fMax === 0) return '';
      if (fMin === fMax) return `${fMin}"`;
      return `${fMin}-${fMax}"`;
    }

    const updated = new Date(data.properties.updateTime);
    const noaaUpdated = document.getElementById('noaaUpdated');
    if (noaaUpdated) {
      let hr = updated.getHours(), ampm = hr >= 12 ? 'pm' : 'am';
      hr = hr % 12 || 12;
      noaaUpdated.textContent = `Updated: ${dateLabel(updated, `${hr}${ampm}`)}`;
    }

    const grid = document.getElementById('forecastGrid');
    grid.innerHTML = '';
    let cumMin = 0, cumMax = 0;
    const tempHidden = localStorage.getItem('showWeather') !== 'false' ? '' : ' hidden';

    // Label card — stretches to full card height, "Totals:" pinned to bottom
    const labelCard = document.createElement('div');
    labelCard.className = 'label-card';
    labelCard.style.cssText = 'display:flex;flex-direction:column;justify-content:flex-end';
    labelCard.innerHTML = `<div style="background:transparent;color:#64748b;text-align:right;padding:7px 4px;font-size:10px;font-weight:600;border-top:1px solid rgba(0,0,0,0.08)">Totals:</div>`;
    grid.appendChild(labelCard);

    // If NOAA's first period is nighttime we're past today's daytime
    const isEvening = periods.length > 0 && periods[0].isDaytime === false;
    const cardDefs = [];
    if (isEvening) {
      cardDefs.push({ day: null, night: periods[0], isToday: true });
      for (let i = 1; i + 1 < periods.length && cardDefs.length < 5; i += 2)
        cardDefs.push({ day: periods[i], night: periods[i + 1], isToday: false });
    } else {
      for (let i = 0; i + 1 < periods.length && cardDefs.length < 5; i += 2)
        cardDefs.push({ day: periods[i], night: periods[i + 1], isToday: i === 0 });
    }

    cardDefs.forEach(({ day, night, isToday }) => {
      const daySnow = day ? extractSnow(day.detailedForecast) : '';
      const nightSnow = night ? extractSnow(night.detailedForecast) : '';

      const dayRange = parseRange(daySnow);
      cumMin += dayRange.min; cumMax += dayRange.max;
      const afterDay = daySnow ? formatCumulative(cumMin, cumMax) : '';

      const nightRange = parseRange(nightSnow);
      cumMin += nightRange.min; cumMax += nightRange.max;
      const afterNight = nightSnow ? formatCumulative(cumMin, cumMax) : '';

      const headerName = isToday ? 'Today' : shortDayName(day.name);
      const dayTempStr = day && day.temperature != null ? `<span style="font-size:75%">▲</span> ${day.temperature}°` : '';
      const nightTempStr = night && night.temperature != null ? `<span style="font-size:75%">▼</span> ${night.temperature}°` : '';
      const totalVal = afterNight || afterDay;

      const card = document.createElement('div');
      card.className = 'day-card';
      card.innerHTML = `
        <div class="day-header">${headerName}</div>
        <div class="row-temp-day weather-temp${tempHidden}">${dayTempStr || '&nbsp;'}</div>
        <div class="row-snow-day">${daySnow || '&nbsp;'}</div>
        <div class="night-label">Night</div>
        <div class="row-temp-night weather-temp${tempHidden}">${nightTempStr || '&nbsp;'}</div>
        <div class="row-snow-night">${nightSnow || '&nbsp;'}</div>
        <div class="row-total">${totalVal || '&nbsp;'}</div>`;
      grid.appendChild(card);
    });
  } catch(e) {
    document.getElementById('forecastGrid').textContent = 'Forecast unavailable';
  }
}

loadStats();
loadForecast();

// Settings
const conditionsEl = document.getElementById('statsOverlay');
const forecastCaptionEl = document.querySelector('.forecast-caption');
const forecastGridEl = document.getElementById('forecastGrid');

function applySettings() {
  const showConditions = document.getElementById('toggleConditions').checked;
  const showForecast = document.getElementById('toggleForecast').checked;
  const showWeather = document.getElementById('toggleWeather').checked;
  conditionsEl.style.display = showConditions ? '' : 'none';
  forecastCaptionEl.style.display = showForecast ? '' : 'none';
  forecastGridEl.style.display = showForecast ? '' : 'none';
  document.querySelectorAll('.weather-temp').forEach(el => {
    el.classList.toggle('hidden', !showWeather);
  });
  localStorage.setItem('showConditions', showConditions);
  localStorage.setItem('showForecast', showForecast);
  localStorage.setItem('showWeather', showWeather);
}

// Load saved prefs
const savedConditions = localStorage.getItem('showConditions');
const savedForecast = localStorage.getItem('showForecast');
const savedWeather = localStorage.getItem('showWeather');
if (savedConditions !== null) document.getElementById('toggleConditions').checked = savedConditions === 'true';
if (savedForecast !== null) document.getElementById('toggleForecast').checked = savedForecast === 'true';
if (savedWeather !== null) document.getElementById('toggleWeather').checked = savedWeather !== 'false';
applySettings();

document.getElementById('toggleConditions').addEventListener('change', applySettings);
document.getElementById('toggleForecast').addEventListener('change', applySettings);
document.getElementById('toggleWeather').addEventListener('change', applySettings);
</script>
<script data-goatcounter="https://49status.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
