<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background-color: #ffffff;
  color: #111;
}
.container { max-width: 100%; padding: 0; }
.top-bar {
  width: 100%;
  background: rgba(255, 255, 255, 0.95);
  padding: 5px 0;
}
.top-table {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
}
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  text-align: center;
}
.cell:not(.logo) a {
  display: inline-block;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 6px 12px;
  text-decoration: none;
  font-weight: 600;
  color: #334155;
  font-size: 13px;
}
.logo img {
  max-width: 100%;
  height: 40px;
  object-fit: contain;
}
#statsOverlay {
  background: rgba(255,255,255,0.8);
  color: #000;
  padding: 6px 8px 6px;
  font-size: 12px;
  box-sizing: border-box;
}
#statsOverlay .stats-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
}
.stats-table {
  margin-top: 6px;
  border-radius: 6px;
  overflow: hidden;
  background: #f1f5f9;
}
.stats-row {
  display: flex;
}
.stats-row > div {
  flex: 1;
  text-align: center;
  padding: 5px 4px;
}
.stats-row.stat-labels > div {
  font-weight: 600;
  font-size: 11px;
  color: #475569;
  border-bottom: 1px solid #e2e8f0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.stats-row.stat-values > div {
  font-weight: 600;
  font-size: 13px;
  color: #1e293b;
}
.section {
  position: relative;
}
.section a img {
  width: 100%;
  display: block;
}
.cam-label {
  position: absolute;
  top: 8px;
  right: 10px;
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
  letter-spacing: 0.03em;
  pointer-events: none;
}
.forecast-caption {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin: 6px 10px 8px;
}
#noaaUpdated {
  text-transform: none;
  font-weight: normal;
  letter-spacing: normal;
}
.forecast-grid {
  display: flex;
  gap: 6px;
  margin: 0 10px 10px;
}
.day-card {
  flex: 1;
  border-radius: 6px;
  font-size: 13px;
  text-align: center;
}
.day-card .day-header {
  background: #94a3b8;
  color: #fff;
  font-weight: 700;
  padding: 7px 4px;
  font-size: 13px;
  border-radius: 6px 6px 0 0;
}
.day-card .row-temp-day {
  background: #fefce8;
  color: #92400e;
  font-weight: 600;
  padding: 7px 4px;
  font-size: 13px;
}
.day-card .row-snow-day {
  background: #fffef5;
  padding: 6px 4px;
  border-top: 1px solid rgba(0,0,0,0.05);
  min-height: 1.2em;
}
.day-card .night-label {
  background: #e2e8f0;
  color: #334155;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 4px 2px;
  text-transform: uppercase;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.day-card .row-temp-night {
  background: #f1f5f9;
  color: #334155;
  font-weight: 600;
  padding: 7px 4px;
  font-size: 13px;
}
.day-card .row-snow-night {
  background: #f8fafc;
  padding: 6px 4px;
  border-top: 1px solid rgba(0,0,0,0.05);
  min-height: 1.2em;
}
.day-card .row-total {
  background: #dde4ed;
  color: #1e293b;
  font-weight: 700;
  font-size: 12px;
  padding: 7px 4px;
  border-top: 1px solid rgba(0,0,0,0.08);
  min-height: 1.2em;
  border-radius: 0 0 6px 6px;
}
.weather-temp.hidden { display: none; }
.snow-label { font-size: 10px; font-weight: 500; color: #64748b; }
.mb-wrap { position: relative; display: inline-block; width: 0; overflow: visible; }
.mb-gif { position: absolute; top: -14px; left: 2px; width: 32px; height: 32px; object-fit: cover; z-index: 10; }
/* Current Weather image overlay */
.wx-ov-inner { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 12px; color:#fff; }
.wx-ov-lbl  { font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; opacity:0.75; text-shadow:0 1px 3px rgba(0,0,0,0.6); }

.wx-ov-temp { font-size:34px; font-weight:700; line-height:1; text-shadow:0 2px 5px rgba(0,0,0,0.6); margin-top:2px; }
.wx-ov-right { text-align:right; display:flex; flex-direction:column; gap:5px; }

  .wx-ov-val  { font-size:10px; }
}
/* Weather Alerts */
.alert-card { margin:0 10px 6px; border-radius:8px; overflow:hidden; border:1px solid transparent; display:flex; }
.alert-bar { width:5px; flex-shrink:0; }
.alert-body { flex:1; padding:8px 10px 6px; }
.alert-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.alert-title { font-weight:700; font-size:13px; }
.alert-expires { font-size:11px; color:#64748b; font-weight:500; }
.alert-details { display:flex; flex-direction:column; gap:5px; margin-bottom:6px; }
.alert-detail-row { display:flex; gap:7px; align-items:baseline; }
.detail-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#94a3b8; flex-shrink:0; width:52px; }
.detail-val { font-size:11px; color:#334155; line-height:1.4; }
.alert-footer { display:flex; justify-content:flex-end; }
.alert-link { font-size:11px; font-weight:600; text-decoration:none; }
.alert-card.warning { background:#fff5f5; border-color:#fca5a5; }
.alert-card.warning .alert-bar { background:#ef4444; }
.alert-card.warning .alert-title { color:#991b1b; }
.alert-card.warning .alert-link { color:#dc2626; }
.alert-card.watch { background:#fff7ed; border-color:#fdba74; }
.alert-card.watch .alert-bar { background:#f97316; }
.alert-card.watch .alert-title { color:#9a3412; }
.alert-card.watch .alert-link { color:#ea580c; }
.alert-card.advisory { background:#fefce8; border-color:#fde047; }
.alert-card.advisory .alert-bar { background:#eab308; }
.alert-card.advisory .alert-title { color:#713f12; }
.alert-card.advisory .alert-link { color:#ca8a04; }
.settings-section {
  margin: 16px 10px 24px;
  padding: 12px 14px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
}
.settings-section summary.settings-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #94a3b8;
  cursor: pointer;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
}
.settings-section summary.settings-title::after {
  content: '▸';
  font-size: 12px;
  transition: transform 0.2s;
}
.settings-section[open] summary.settings-title::after {
  transform: rotate(90deg);
}
.settings-section[open] summary.settings-title {
  margin-bottom: 10px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid #e2e8f0;
}
.settings-row:last-child { border-bottom: none; }
.settings-row label {
  font-size: 13px;
  font-weight: 500;
  color: #334155;
  cursor: pointer;
}
.toggle-switch {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #cbd5e1;
  border-radius: 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider:before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch input:checked + .toggle-slider { background: #64748b; }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
@media (max-width: 480px) and (orientation: portrait) {
  .day-card { font-size: 10px; }
  .day-card .day-header { font-size: 10px; padding: 5px 2px; }
  .day-card .row-temp-day, .day-card .row-temp-night { font-size: 10px; padding: 5px 2px; }
  .day-card .row-snow-day, .day-card .row-snow-night { font-size: 10px; padding: 4px 2px; }
  .day-card .night-label { font-size: 8px; padding: 3px 1px; }
  .day-card .row-total { font-size: 10px; padding: 5px 2px; }
  .forecast-grid { gap: 3px; }
}
</style>

<script>
const statsOverlay = document.getElementById('statsOverlay');

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function dateLabel(date, hourStr) {
  const today = new Date(), yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);
  if (sameDay(date, today)) return `Today ${hourStr}`;
  if (sameDay(date, yesterday)) return `Yesterday ${hourStr}`;
  const mo = (date.getMonth()+1).toString().padStart(2,'0');
  const dy = date.getDate().toString().padStart(2,'0');
  return `${mo}/${dy} ${hourStr}`;
}

// Single fetch for all ski49n.com data via Cloudflare Worker
let _workerData = null;
async function fetchWorker() {
  if (_workerData) return _workerData;
  const res = await fetch('https://49.todd-0ce.workers.dev?t=' + Date.now());
  _workerData = await res.json();
  return _workerData;
}

async function loadStats() {
  try {
    const data = await fetchWorker();
    const t = data.totals;
    if (!t) { statsOverlay.textContent = "Data Error"; return; }

    function formatUpdated(str) {
      const match = str.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)(am|pm)/i);
      if (!match) return str;
      const [, mo, dy, yr] = match;
      const updated = new Date(2000 + parseInt(yr), parseInt(mo)-1, parseInt(dy));
      const today = new Date(); today.setHours(0,0,0,0);
      updated.setHours(0,0,0,0);
      const diffDays = Math.round((today - updated) / 86400000);
      const dateStr = `${mo.padStart(2,'0')}/${dy.padStart(2,'0')}`;
      if (diffDays === 0) return `Today, ${dateStr}`;
      if (diffDays === 1) return `Yesterday, ${dateStr}`;
      return `${diffDays} days ago, ${dateStr}`;
    }

    const stats = [
      { label: '12h',   val: t["12h"]       },
      { label: '24h',   val: t["24h"]       },
      { label: '48h',   val: t["48h"]       },
      { label: '72h',   val: t["72h"]       },
      { label: 'Depth', val: t.summitDepth  },
    ].filter(s => s.val !== undefined && s.val !== null && s.val !== '');

    statsOverlay.innerHTML = `
      <div class="stats-header">
        <a href="https://www.ski49n.com/mountain-info/expanded-conditions" target="_blank" style="font-weight:700;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#888;text-decoration:none;">Latest Snowfall ⧉</a>
        <span style="color:#888;">As of ${formatUpdated(t.updated || '')}</span>
      </div>
      <div class="stats-table">
        <div class="stats-row stat-labels">${stats.map(s => `<div>${s.label}</div>`).join('')}</div>
        <div class="stats-row stat-values">${stats.map(s => `<div>${s.val}" <span class="snow-label">Snow</span></div>`).join('')}</div>
      </div>
    `;
  } catch(e) {
    statsOverlay.textContent = "Data Error";
  }
}

// Load 5-day snowfall forecast from NWS MapClick (mountain-elevation-aware)
async function loadForecast() {
  try {
    const res = await fetch('https://forecast.weather.gov/MapClick.php?lon=-117.56499767303468&lat=48.285800530169524&FcstType=json');
    const data = await res.json();

    const names  = data.time.startPeriodName;
    const labels = data.time.tempLabel;   // "High" or "Low"
    const temps  = data.data.temperature;
    const texts  = data.data.text;

    const periods = names.slice(0, 10).map((name, i) => ({
      name,
      temperature: parseInt(temps[i]) || null,
      detailedForecast: texts[i] || '',
      isDaytime: labels[i] === 'High'
    }));

    function extractSnow(detail) {
      // MapClick: "Total daytime/nighttime snow accumulation of X"
      // Gridpoint fallback: "new snow accumulation of X"
      const match = detail.match(/(?:Total (?:daytime|nighttime) snow accumulation|new snow accumulation) of ([^.]+)/i);
      if (!match) return '';
      let s = match[1].trim().toLowerCase().replace(/\s*possible\s*$/, '').trim();
      if (/less than half an inch/.test(s)) return '< .5"';
      const ltMatch = s.match(/less than (\d+) inch/);
      if (ltMatch) return `< ${ltMatch[1]}"`;
      const rangeMatch = s.match(/(\d+) to (\d+) inch/);
      if (rangeMatch) return `${rangeMatch[1]}-${rangeMatch[2]}"`;
      const aroundMatch = s.match(/around (\d+) inch/);
      if (aroundMatch) return `~${aroundMatch[1]}"`;
      const upToMatch = s.match(/up to (\d+) inch/);
      if (upToMatch) return `up to ${upToMatch[1]}"`;
      const singleMatch = s.match(/^(\d+) inch/);
      if (singleMatch) return `${singleMatch[1]}"`;
      return s;
    }

    function shortDayName(name) {
      const clean = name.replace(/ Night$/, '').replace('This Afternoon', 'Today').replace('Tonight', 'Today');
      const map = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed', Thursday:'Thu', Friday:'Fri', Saturday:'Sat', Sunday:'Sun', Today:'Today' };
      return map[clean] || clean;
    }

    function parseRange(formatted) {
      if (!formatted) return { min: 0, max: 0 };
      if (formatted === '< .5"') return { min: 0, max: 0.5 };
      const lt = formatted.match(/^< (\d+(?:\.\d+)?)"$/);
      if (lt) return { min: 0, max: parseFloat(lt[1]) };
      const range = formatted.match(/^(\d+(?:\.\d+)?)-(\d+(?:\.\d+)?)"$/);
      if (range) return { min: parseFloat(range[1]), max: parseFloat(range[2]) };
      const around = formatted.match(/^~(\d+(?:\.\d+)?)"$/);
      if (around) return { min: parseFloat(around[1]), max: parseFloat(around[1]) };
      const upTo = formatted.match(/^up to (\d+(?:\.\d+)?)"$/);
      if (upTo) return { min: 0, max: parseFloat(upTo[1]) };
      const single = formatted.match(/^(\d+(?:\.\d+)?)"$/);
      if (single) return { min: parseFloat(single[1]), max: parseFloat(single[1]) };
      return { min: 0, max: 0 };
    }

    function formatCumulative(min, max) {
      const fMin = Math.floor(min);
      const fMax = Math.floor(max);
      if (fMin === 0 && fMax === 0) return '';
      if (fMin === fMax) return `${fMin}"`;
      return `${fMin}-${fMax}"`;
    }

    function needsMindBlown(formatted) {
      if (!formatted) return false;
      return parseRange(formatted).max > 6;
    }

    const mbGif = '<span class="mb-wrap"><img class="mb-gif" src="mind_blown.gif" alt=""/></span>';

    const noaaUpdated = document.getElementById('noaaUpdated');
    if (noaaUpdated) {
      const now = new Date();
      let hr = now.getHours(), ampm = hr >= 12 ? 'pm' : 'am';
      hr = hr % 12 || 12;
      noaaUpdated.textContent = `As of ${dateLabel(now, `@ ${hr}${ampm}`)}`;
    }

    const grid = document.getElementById('forecastGrid');
    grid.innerHTML = '';
    let cumMin = 0, cumMax = 0;
    const tempHidden = localStorage.getItem('showWeather') !== 'false' ? '' : ' hidden';

    // Hide snow amounts under 1" (treat as 0, don't display)
    function filterSnow(s) {
      if (!s) return '';
      return parseRange(s).max < 1 ? '' : s;
    }

    const faintZero = '<span style="color:#94a3b8;font-weight:400">0</span>';

    // If first period is nighttime we're past today's daytime
    const isEvening = periods.length > 0 && periods[0].isDaytime === false;
    const cardDefs = [];
    if (isEvening) {
      cardDefs.push({ day: null, night: periods[0], isToday: true });
      for (let i = 1; i + 1 < periods.length && cardDefs.length < 5; i += 2)
        cardDefs.push({ day: periods[i], night: periods[i + 1], isToday: false });
    } else {
      for (let i = 0; i + 1 < periods.length && cardDefs.length < 5; i += 2)
        cardDefs.push({ day: periods[i], night: periods[i + 1], isToday: i === 0 });
    }

    // Find warmest high and coldest low for highlighting
    const allHighs = cardDefs.map(c => c.day && c.day.temperature != null ? c.day.temperature : null).filter(t => t !== null);
    const allLows  = cardDefs.map(c => c.night && c.night.temperature != null ? c.night.temperature : null).filter(t => t !== null);
    const maxHigh = allHighs.length ? Math.max(...allHighs) : null;
    const minLow  = allLows.length  ? Math.min(...allLows)  : null;

    cardDefs.forEach(({ day, night, isToday }) => {
      const daySnowRaw = day ? extractSnow(day.detailedForecast) : '';
      const nightSnowRaw = night ? extractSnow(night.detailedForecast) : '';
      const daySnow = filterSnow(daySnowRaw);
      const nightSnow = filterSnow(nightSnowRaw);

      // Always accumulate so tonight feeds into next-day totals; hide total for Today
      const dayRange = parseRange(daySnowRaw);
      cumMin += dayRange.min; cumMax += dayRange.max;
      const afterDay = daySnowRaw ? formatCumulative(cumMin, cumMax) : '';

      const nightRange = parseRange(nightSnowRaw);
      cumMin += nightRange.min; cumMax += nightRange.max;
      const afterNight = nightSnowRaw ? formatCumulative(cumMin, cumMax) : '';

      const totalVal = isToday ? '' : (afterNight || afterDay);

      const headerName = isToday ? 'Today' : shortDayName(day.name);
      const dayTempStr = day && day.temperature != null ? `High: ${day.temperature}°` : '';
      const nightTempStr = night && night.temperature != null ? `Low: ${night.temperature}°` : '';
      const dayTempStyle = (day && day.temperature === maxHigh) ? ' style="background:#fefacd;"' : '';
      const nightTempStyle = (night && night.temperature === minLow) ? ' style="background:#dbeafe;"' : '';

      const snowCell = (val, snowForGif) =>
        `${val} <span class="snow-label">Snow</span>${needsMindBlown(snowForGif) ? mbGif : ''}`;

      const daySnowCell = isToday && !day ? '&nbsp;'
        : snowCell(daySnow || faintZero, daySnow);
      const nightSnowCell = snowCell(nightSnow || faintZero, nightSnow);
      const totalCell = isToday
        ? '<span style="font-size:10px;font-weight:600;color:#64748b;letter-spacing:0.04em">TOTALS:</span>'
        : (totalVal ? snowCell(totalVal, totalVal) : '&nbsp;');

      const card = document.createElement('div');
      card.className = 'day-card';
      card.innerHTML = `
        <div class="day-header">${headerName}</div>
        <div class="row-temp-day weather-temp${tempHidden}"${dayTempStyle}>${dayTempStr || '&nbsp;'}</div>
        <div class="row-snow-day">${daySnowCell}</div>
        <div class="night-label">Night</div>
        <div class="row-temp-night weather-temp${tempHidden}"${nightTempStyle}>${nightTempStr || '&nbsp;'}</div>
        <div class="row-snow-night">${nightSnowCell}</div>
        <div class="row-total">${totalCell}</div>`;
      grid.appendChild(card);
    });
  } catch(e) {
    document.getElementById('forecastGrid').textContent = 'Forecast unavailable';
  }
}

async function loadCurrentWeather() {
  try {
    const data = await fetchWorker();
    const s = data.summit;
    if (!s || !s.temp) return;

    document.getElementById('wxCondName').textContent = s.conditions || s.precipitation || '';
    document.getElementById('wxTempLarge').textContent = `${s.temp}°`;

    const rows = [];
    if (s.wind)          rows.push(`<div class="wx-ov-item"><div class="wx-ov-lbl">Wind</div><div class="wx-ov-val">${s.wind}</div></div>`);
    if (s.visibility)    rows.push(`<div class="wx-ov-item"><div class="wx-ov-lbl">Visibility</div><div class="wx-ov-val">${s.visibility}</div></div>`);
    if (s.precipitation) rows.push(`<div class="wx-ov-item"><div class="wx-ov-lbl">Precip</div><div class="wx-ov-val">${s.precipitation}</div></div>`);
    document.getElementById('wxWindInfo').innerHTML = rows.join('');

    document.getElementById('currentWeatherOverlay').dataset.loaded = 'true';
    applySettings();
  } catch(e) { /* silently fail */ }
}

let alertsHtml = '';

function renderAlerts() {
  const showAlerts = document.getElementById('toggleAlerts').checked;
  const section = document.getElementById('alertsSection');
  if (showAlerts && alertsHtml) {
    section.innerHTML = alertsHtml;
    section.style.display = '';
  } else {
    section.style.display = 'none';
  }
}

async function loadAlerts() {
  try {
    const res = await fetch('https://api.weather.gov/alerts/active?point=48.2858,-117.565');
    const data = await res.json();
    const features = (data.features || []).filter(f => f.properties && f.properties.event);
    if (!features.length) { renderAlerts(); return; }

    function parseSection(desc, name) {
      const re = new RegExp('\\*\\s*' + name + '\\.{3}([\\s\\S]*?)(?=\\n\\s*\\*|$)', 'i');
      const m = desc.match(re);
      return m ? m[1].trim().replace(/\s+/g, ' ') : '';
    }

    alertsHtml = features.map(f => {
      const p = f.properties;
      const event = p.event || '';
      const desc = p.description || '';
      const expires = p.expires ? new Date(p.expires) : null;

      let cls = 'advisory';
      if (/warning/i.test(event)) cls = 'warning';
      else if (/watch/i.test(event)) cls = 'watch';

      const what    = parseSection(desc, 'WHAT');
      const impacts = parseSection(desc, 'IMPACTS');
      const actions = parseSection(desc, 'PRECAUTIONARY/PREPAREDNESS ACTIONS');

      let expiresStr = '';
      if (expires) {
        let hr = expires.getHours(), ampm = hr >= 12 ? 'pm' : 'am';
        hr = hr % 12 || 12;
        expiresStr = `Expires ${dateLabel(expires, `@ ${hr}${ampm}`)}`;
      }

      const rows = [
        what    ? `<div class="alert-detail-row"><span class="detail-lbl">What</span><span class="detail-val">${what}</span></div>` : '',
        impacts ? `<div class="alert-detail-row"><span class="detail-lbl">Impacts</span><span class="detail-val">${impacts}</span></div>` : '',
        actions ? `<div class="alert-detail-row"><span class="detail-lbl">Actions</span><span class="detail-val">${actions}</span></div>` : '',
      ].filter(Boolean).join('');

      return `<div class="alert-card ${cls}">
        <div class="alert-bar"></div>
        <div class="alert-body">
          <div class="alert-header">
            <span class="alert-title">${event}</span>
            <span class="alert-expires">${expiresStr}</span>
          </div>
          ${rows ? `<div class="alert-details">${rows}</div>` : ''}
          <div class="alert-footer"><a class="alert-link" href="https://forecast.weather.gov/MapClick.php?lon=-117.56499767303468&lat=48.285800530169524" target="_blank">Full Details ⧉</a></div>
        </div>
      </div>`;
    }).join('');

    renderAlerts();
  } catch(e) { /* silently fail */ }
}

loadStats();
loadForecast();
loadCurrentWeather();
loadAlerts();

// Settings
const conditionsEl = document.getElementById('statsOverlay');
const forecastCaptionEl = document.querySelector('.forecast-caption');
const forecastGridEl = document.getElementById('forecastGrid');

const groomingBannerEl = document.getElementById('groomingBanner');

function applySettings() {
  const showConditions = document.getElementById('toggleConditions').checked;
  const showForecast = document.getElementById('toggleForecast').checked;
  const showWeather = document.getElementById('toggleWeather').checked;
  const showGrooming = document.getElementById('toggleGrooming').checked;
  const showCurrentWeather = document.getElementById('toggleCurrentWeather').checked;
  const showFacebook = document.getElementById('toggleFacebook').checked;
  conditionsEl.style.display = showConditions ? '' : 'none';
  forecastCaptionEl.style.display = showForecast ? '' : 'none';
  forecastGridEl.style.display = showForecast ? '' : 'none';
  groomingBannerEl.style.display = showGrooming ? '' : 'none';
  document.getElementById('facebookFeed').style.display = showFacebook ? '' : 'none';
  const overlay = document.getElementById('currentWeatherOverlay');
  overlay.style.display = (showCurrentWeather && overlay.dataset.loaded) ? '' : 'none';
  renderAlerts();
  document.querySelectorAll('.weather-temp').forEach(el => {
    el.classList.toggle('hidden', !showWeather);
  });
  localStorage.setItem('showConditions', showConditions);
  localStorage.setItem('showForecast', showForecast);
  localStorage.setItem('showWeather', showWeather);
  localStorage.setItem('showGrooming', showGrooming);
  localStorage.setItem('showCurrentWeather', showCurrentWeather);
  localStorage.setItem('showFacebook', showFacebook);
  localStorage.setItem('showAlerts', document.getElementById('toggleAlerts').checked);
}

// Load saved prefs
const savedConditions = localStorage.getItem('showConditions');
const savedForecast = localStorage.getItem('showForecast');
const savedWeather = localStorage.getItem('showWeather');
const savedGrooming = localStorage.getItem('showGrooming');
const savedCurrentWeather = localStorage.getItem('showCurrentWeather');
const savedAlerts = localStorage.getItem('showAlerts');
const savedFacebook = localStorage.getItem('showFacebook');
if (savedConditions !== null) document.getElementById('toggleConditions').checked = savedConditions === 'true';
if (savedForecast !== null) document.getElementById('toggleForecast').checked = savedForecast === 'true';
if (savedWeather !== null) document.getElementById('toggleWeather').checked = savedWeather !== 'false';
if (savedGrooming !== null) document.getElementById('toggleGrooming').checked = savedGrooming === 'true';
if (savedCurrentWeather !== null) document.getElementById('toggleCurrentWeather').checked = savedCurrentWeather === 'true';
if (savedAlerts !== null) document.getElementById('toggleAlerts').checked = savedAlerts !== 'false';
if (savedFacebook !== null) document.getElementById('toggleFacebook').checked = savedFacebook !== 'false';
applySettings();

document.getElementById('toggleConditions').addEventListener('change', applySettings);
document.getElementById('toggleForecast').addEventListener('change', applySettings);
document.getElementById('toggleWeather').addEventListener('change', applySettings);
document.getElementById('toggleGrooming').addEventListener('change', applySettings);
document.getElementById('toggleCurrentWeather').addEventListener('change', applySettings);
document.getElementById('toggleAlerts').addEventListener('change', applySettings);
document.getElementById('toggleFacebook').addEventListener('change', applySettings);
</script>
