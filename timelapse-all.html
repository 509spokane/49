<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lodge Timelapse – All Frames</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  h2 { margin: 0 0 12px; font-size: 16px; color: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; }
  #wrap { position: relative; width: 100%; max-width: 700px; }
  #frame { width: 100%; display: block; border-radius: 6px; }
  #info { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 0 0 6px 6px; display: flex; justify-content: space-between; font-size: 13px; }
  #bar-wrap { width: 100%; max-width: 700px; height: 4px; background: rgba(255,255,255,0.15); margin: 6px 0; border-radius: 2px; }
  #bar { height: 100%; background: #fff; border-radius: 2px; transition: width 0.2s linear; }
  #controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  button { background: #334155; color: #fff; border: none; border-radius: 20px; padding: 6px 18px; cursor: pointer; font-size: 13px; font-weight: 600; }
  button:hover { background: #475569; }
  label { font-size: 12px; color: #94a3b8; }
  select { background: #1e293b; color: #fff; border: 1px solid #475569; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
</style>
</head>
<body>
<h2>Lodge Webcam – All Frames</h2>
<div id="wrap">
  <img id="frame" src="" alt="Timelapse frame" />
  <div id="info">
    <span id="timestamp">–</span>
    <span id="counter">0 / 0</span>
  </div>
</div>
<div id="bar-wrap"><div id="bar" style="width:0%"></div></div>
<div id="controls">
  <button id="btn">⏸ Pause</button>
  <label>Speed:
    <select id="speed">
      <option value="600">Slow (0.6s)</option>
      <option value="300" selected>Normal (0.3s)</option>
      <option value="150">Fast (0.15s)</option>
      <option value="80">Very Fast (0.08s)</option>
    </select>
  </label>
</div>

  { date: "2026-04-11", time: "02-03" },
  { date: "2026-04-11", time: "04-28" },
  { date: "2026-04-11", time: "04-53" },
  { date: "2026-04-11", time: "06-01" },

function fmtTime(t) {
  const [hh, mm] = t.split('-');
  let h = parseInt(hh);
  const ap = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return `${h}:${mm} ${ap}`;
}

function fmtDate(d) {
  const [y, m, day] = d.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${names[parseInt(m)-1]} ${parseInt(day)}`;
}

let idx = 0, interval = null, playing = true;
const img = document.getElementById('frame');
const ts = document.getElementById('timestamp');
const ctr = document.getElementById('counter');
const bar = document.getElementById('bar');
const btn = document.getElementById('btn');
const speedSel = document.getElementById('speed');

function show(i) {
  const f = frames[i];
  img.src = `frames/${f.date}/lodge/${f.time}.jpg`;
  ts.textContent = `${fmtDate(f.date)}  ${fmtTime(f.time)} UTC`;
  ctr.textContent = `${i + 1} / ${frames.length}`;
  bar.style.width = Math.round((i + 1) / frames.length * 100) + '%';
}

function start() {
  interval = setInterval(() => {
    idx = (idx + 1) % frames.length;
    show(idx);
  }, parseInt(speedSel.value));
}

show(0);
start();

btn.addEventListener('click', () => {
  if (playing) {
    clearInterval(interval);
    btn.textContent = '▶ Play';
  } else {
    start();
    btn.textContent = '⏸ Pause';
  }
  playing = !playing;
});

speedSel.addEventListener('change', () => {
  if (playing) { clearInterval(interval); start(); }
});
</script>
